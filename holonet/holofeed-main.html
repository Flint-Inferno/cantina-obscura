@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

:root {
  --bg: #020610;
  --panel: #040916;
  --panel2: #060c1c;
  --border: #0e1e40;
  --border2: #1c3060;
  --glow: #4ab4ff;
  --glow-dim: #3a80cc;
  --glow-rgb: 74,180,255;
  --amber: #2af5ff;
  --amber-dim: #1a9aaa;
  --danger: #ff4466;
  --dim-text: #3a60a0;
  --scan: rgba(0,0,20,0.15);
  --font-alien: 'Aurebesh', serif;
  --font-eng: 'Share Tech Mono', 'Courier New', monospace;
  --font-title: 'Orbitron', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #010408;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 12px;
  font-family: var(--font-alien);
  color: var(--glow);
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, var(--scan) 3px, var(--scan) 4px);
  pointer-events: none;
  z-index: 9000;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
  z-index: 9001;
}

#datapad {
  width: 100%;
  max-width: 900px;
  background: var(--bg);
  border: 2px solid var(--border2);
  border-radius: 6px;
  box-shadow: 0 0 30px rgba(var(--glow-rgb),0.08), inset 0 0 40px rgba(0,0,0,0.5), 0 0 2px var(--glow-dim);
  position: relative;
  overflow: hidden;
}

#datapad::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(var(--glow-rgb),0.02) 0%, transparent 30%);
  pointer-events: none;
  z-index: 0;
}

#header {
  position: relative;
  z-index: 1;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border2);
  background: var(--panel2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
}

#header-left { display: flex; flex-direction: column; gap: 2px; }

#header-title {
  font-family: var(--font-title);
  font-size: 13px;
  letter-spacing: 4px;
  color: var(--amber);
  text-shadow: 0 0 8px var(--amber-dim);
  text-transform: uppercase;
}

#header-sub {
  font-family: var(--font-alien);
  font-size: 12px;
  color: var(--glow-dim);
}

#header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

#clock {
  font-family: var(--font-eng);
  font-size: 11px;
  color: var(--glow-dim);
  min-width: 90px;
  text-align: right;
}

.header-btn {
  background: none;
  border: 1px solid var(--glow-dim);
  color: var(--glow-dim);
  font-family: var(--font-eng);
  font-weight: bold;
  font-size: 9px;
  padding: 4px 8px;
  cursor: pointer;
  letter-spacing: 1px;
  border-radius: 2px;
  transition: all 0.2s;
  white-space: nowrap;
}

.header-btn:hover {
  border-color: var(--glow);
  color: var(--glow);
  box-shadow: 0 0 6px rgba(var(--glow-rgb),0.3);
}

.header-btn.active {
  border-color: var(--amber);
  color: var(--amber);
  box-shadow: 0 0 6px rgba(200,146,10,0.3);
}

.tab-nav {
  position: relative;
  z-index: 1;
  display: flex;
  border-bottom: 1px solid var(--border2);
  background: var(--panel);
  overflow-x: auto;
}

.tab-btn {
  flex: 1;
  min-width: 80px;
  padding: 8px 4px;
  background: none;
  border: none;
  border-right: 1px solid var(--border);
  cursor: pointer;
  font-family: var(--font-alien);
  font-size: 13px;
  letter-spacing: 0px;
  color: var(--glow-dim);
  transition: all 0.2s;
  position: relative;
}
.tab-btn.active {
  font-family: var(--font-eng);
  font-weight: bold;
  font-size: 11px;
  letter-spacing: 1px;
}
.tab-btn:last-child { border-right: none; }
.tab-btn:hover { color: var(--glow); background: rgba(var(--glow-rgb),0.05); }
.tab-btn.active {
  color: var(--glow);
  background: rgba(var(--glow-rgb),0.08);
  text-shadow: 0 0 8px rgba(var(--glow-rgb),0.5);
  font-family: var(--font-eng);
  font-weight: bold;
  font-size: 11px;
  letter-spacing: 1px;
}
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--glow);
  box-shadow: 0 0 6px var(--glow);
}

.tab-pane { display: none; position: relative; z-index: 1; min-height: 400px; }
.tab-pane.active { display: block; }

/* TRANSLATE */
.translated-tab .alien-text,
.translated-tab .lb-name,
.translated-tab .stock-name {
  font-family: var(--font-eng) !important;
  font-weight: bold !important;
  font-size: 0.82em !important;
}


#news-pane { overflow-y: auto; max-height: 520px; }

.news-item {
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  cursor: pointer;
  transition: background 0.15s;
}
.news-item:hover { background: rgba(var(--glow-rgb),0.04); }
.news-item.ad { background: rgba(200,146,10,0.04); border-left: 2px solid var(--amber-dim); }

.news-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 4px; }
.news-tag {
  font-family: var(--font-eng); font-weight: bold; font-size: 9px;
  padding: 1px 5px; border-radius: 2px; letter-spacing: 1px;
}
.news-tag.breaking { background: var(--danger); color: #fff; }
.news-tag.ad-tag { background: var(--amber-dim); color: var(--amber); }
.news-tag.standard { border: 1px solid var(--glow-dim); color: var(--glow-dim); }
.news-time { font-family: var(--font-eng); font-weight: bold; font-size: 9px; color: var(--dim-text); }

.news-headline { font-size: 14px; line-height: 1.4; color: var(--glow); margin-bottom: 4px; }
.news-body { font-size: 12px; line-height: 1.5; color: var(--glow-dim); display: none; }
.news-item.expanded .news-body { display: block; }
.news-item.translated .news-headline,
.news-item.translated .news-body { font-family: var(--font-eng) !important; font-weight: bold !important; font-size: 12px !important; }

/* RACE */
#race-canvas-wrap {
  background: #020402;
  border-bottom: 1px solid var(--border);
  padding: 8px;
  display: flex;
  justify-content: center;
  position: relative;
}
#prerace-overlay {
  display: none;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Aurebesh', serif;
  font-size: 140px;
  line-height: 1;
  color: var(--amber);
  text-shadow: 0 0 40px var(--amber), 0 0 80px var(--amber), 0 0 120px var(--amber);
  pointer-events: none;
  z-index: 10;
  text-align: center;
}
#race-canvas { border: 1px solid var(--border); display: block; max-width: 100%; }

#race-status {
  text-align: center;
  padding: 6px;
  font-family: var(--font-eng);
  font-weight: bold;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 2px;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  min-height: 26px;
}

#race-track-label {
  text-align: center;
  padding: 3px 12px;
  font-family: var(--font-eng);
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--glow-dim);
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}

#leaderboard { padding: 8px 14px; }
.lb-title { font-family: var(--font-eng); font-weight: bold; font-size: 9px; color: var(--glow-dim); letter-spacing: 3px; margin-bottom: 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.lb-row { display: grid; grid-template-columns: 20px 110px 1fr 44px 60px 52px; gap: 4px; align-items: center; padding: 3px 0; border-bottom: 1px solid rgba(26,44,20,0.5); font-size: 13px; position: absolute; width: 100%; box-sizing: border-box; transition: top 0.2s ease; }
.lb-health { font-family: var(--font-eng); font-weight: bold; font-size: 10px; text-align: right; }
.lb-laptime { font-family: var(--font-eng); font-weight: bold; font-size: 10px; color: var(--glow-dim); text-align: right; }
.lb-msg { font-family: var(--font-eng); font-size: 9px; white-space: nowrap; overflow: hidden; letter-spacing: 0.5px; padding: 0 4px; }
.lb-msg-inner { display: inline-block; white-space: nowrap; will-change: transform; }
.lb-pos { color: var(--glow-dim); font-family: var(--font-eng); font-weight: bold; font-size: 10px; }
.lb-laptime { font-family: var(--font-eng); font-weight: bold; font-size: 10px; color: var(--glow-dim); text-align: right; }
.lb-laps { font-family: var(--font-eng); font-weight: bold; font-size: 10px; color: var(--amber-dim); text-align: right; }

@keyframes flash-name { 0%,100%{opacity:1}50%{opacity:0.1} }
.winner-flash .lb-name { animation: flash-name 0.6s infinite; }

/* STOCKS */
#stocks-pane { padding: 10px; overflow-y: auto; max-height: 520px; }
.stock-card { background: var(--panel); border: 1px solid var(--border); border-radius: 2px; margin-bottom: 10px; padding: 8px 10px; }
.stock-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.stock-name { font-size: 13px; color: var(--glow); }
.stock-ticker-sym { font-family: var(--font-eng); font-weight: bold; font-size: 10px; color: var(--glow-dim); }
.stock-price { font-family: var(--font-eng); font-weight: bold; font-size: 14px; }
.stock-price.up { color: var(--glow); }
.stock-price.down { color: var(--danger); }
.stock-change { font-family: var(--font-eng); font-weight: bold; font-size: 10px; }
.stock-change.up { color: var(--glow); }
.stock-change.down { color: var(--danger); }
.stock-chart-canvas { width: 100%; height: 60px; display: block; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Animated scanline sweep */
#scanline-sweep {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 8998;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    transparent 44%,
    rgba(var(--glow-rgb),0.015) 47%,
    rgba(var(--glow-rgb),0.06) 50%,
    rgba(var(--glow-rgb),0.015) 53%,
    transparent 56%,
    transparent 100%
  );
  animation: sweepdown 6s linear infinite;
}
@keyframes sweepdown {
  0%   { transform: translateY(-100vh); }
  100% { transform: translateY(100vh);  }
}

/* ── UNIVERSAL TRANSLATOR POPUP ── */
#ut-btn {
  position: fixed;
  bottom: 14px;
  right: 14px;
  z-index: 9500;
  background: var(--panel2);
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  font-family: 'Share Tech Mono', monospace !important;
  font-weight: bold;
  font-size: 10px;
  letter-spacing: 1.5px;
  padding: 5px 10px;
  cursor: pointer;
  border-radius: 2px;
  box-shadow: 0 0 8px rgba(200,146,10,0.2);
  transition: all 0.2s;
}
#ut-btn:hover {
  border-color: var(--amber);
  box-shadow: 0 0 14px rgba(200,146,10,0.4);
}

#ut-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 300px;
  height: 70vh;
  z-index: 9400;
  background: rgba(6, 10, 5, 0.72);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  border-left: 2px solid var(--amber-dim);
  border-bottom: 2px solid var(--amber-dim);
  border-bottom-left-radius: 6px;
  box-shadow: -6px 4px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  transform: translateY(-100%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}
#ut-panel.open {
  transform: translateY(0);
}

#ut-header {
  padding: 8px 12px 6px;
  background: rgba(200,146,10,0.06);
  border-bottom: 1px solid var(--amber-dim);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
#ut-header-title {
  font-family: 'Orbitron', sans-serif !important;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--amber) !important;
  text-transform: uppercase;
}
#ut-close {
  background: none;
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  font-family: 'Share Tech Mono', monospace !important;
  font-size: 10px;
  padding: 2px 7px;
  cursor: pointer;
  border-radius: 2px;
  line-height: 1;
}
#ut-close:hover { border-color: var(--amber); }

#ut-subtitle {
  padding: 5px 12px;
  font-family: 'Share Tech Mono', monospace !important;
  font-size: 9px;
  color: var(--amber-dim) !important;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#ut-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 2px;
  padding: 8px;
  overflow-y: auto;
  flex: 1;
}

.ut-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 5px 2px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: rgba(8, 13, 7, 0.55);
  gap: 2px;
}
.ut-aur {
  font-family: 'Aurebesh', serif !important;
  font-size: 20px;
  line-height: 1;
  color: var(--glow) !important;
}
.ut-eng {
  font-family: 'Share Tech Mono', monospace !important;
  font-weight: bold !important;
  font-size: 13px;
  color: var(--amber) !important;
  letter-spacing: 1px;
}

/* Prevent translate from touching ut-panel */
#ut-panel, #ut-panel * {
  /* block all translate overrides */
}

.stock-card {
  background: #050a05;
  border: 1px solid var(--border2);
  border-radius: 2px;
  margin-bottom: 10px;
  padding: 8px 10px;
}
.stock-chart-canvas {
  width: 100%;
  height: 70px;
  display: block;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}


/* ── MOBILE DROPDOWN TAB NAV ── */
#tab-dropdown-wrap {
  display: none;
  position: relative;
  z-index: 2;
  background: var(--panel);

// ============================================================
// SEEDED RNG — mulberry32
// ============================================================
function mulberry32(seed) {
  let s = seed >>> 0;
  return function() {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function pickN(arr, n, rng) {
  const pool = arr.slice(); const out = [];
  for (let i = 0; i < n && pool.length > 0; i++) {
    const idx = Math.floor(rng() * pool.length);
    out.push(pool.splice(idx, 1)[0]);
  }
  return out;
}

function shuffle(arr, rng) {
  const a = arr.slice();
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(rng()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ============================================================
// NEWS FEED TIMING ENGINE
// ============================================================
// The feed uses a continuously looping schedule seeded from Unix time,
// so every device sees the same items at the same moment.
//
// KEY TIMING VALUES you may want to tweak:
//   Interval between posts: 180 + random(0..120) seconds  →  3 to 5 minutes
//     To make posts appear faster: lower 180 (minimum gap) and/or 120 (random range)
//     Example for ~1–2 min gaps: change to  60 + Math.floor(_feedRng()*60)
//
//   EXPIRE (below in buildNewsFeed): how long a post stays visible (default: 1800s = 30 min)
//     Increase to keep stories on screen longer.
//
// The full cycle (all 40 items) takes roughly 160 minutes before looping.
// Each loop reshuffles headline/ad order so it never feels identical.
// ============================================================
// Pre-compute the fixed schedule shape once (intervals only, no shuffle)
// Seed 0xFEED = 65261 — stable across all sessions
const _feedRng = mulberry32(65261);
const _scheduleShape = [];
{
  let hi = 0, ai = 0;
  while (hi < 30 || ai < 10) {
    for (let k = 0; k < 3 && hi < 30; k++, hi++) {
      _scheduleShape.push({type:'headline', pos:hi, interval: 180 + Math.floor(_feedRng()*120)});
    }
    if (ai < 10) {
      _scheduleShape.push({type:'ad', pos:ai, interval: 180 + Math.floor(_feedRng()*120)});
      ai++;
    }
  }
  // Attach cumulative offsets
  let off = 0;
  _scheduleShape.forEach(s => { s.offset = off; off += s.interval; });
  _scheduleShape._cycleDuration = off; // ~160 min total
}

function buildNewsFeed(now) {
  const CYCLE = _scheduleShape._cycleDuration;
  // Which loop iteration are we in?
  const cycleNum = Math.floor(now / CYCLE);
  const EXPIRE = 1800; // 30 min
  const visible = [];

  // Check current cycle and the one before (items near boundary might still be visible)
  for (let c = Math.max(0, cycleNum - 1); c <= cycleNum; c++) {
    const cycleStart = c * CYCLE;
    // Each cycle gets its own shuffle so content order varies per loop
    const hOrder = shuffle(Array.from({length:30},(_,i)=>i), mulberry32(c * 54321 + 1));
    const aOrder = shuffle(Array.from({length:10},(_,i)=>i), mulberry32(c * 54321 + 2));

    _scheduleShape.forEach(s => {
      const t = cycleStart + s.offset;
      if (t <= now && t > now - EXPIRE) {
        const idx = s.type === 'headline' ? hOrder[s.pos] : aOrder[s.pos];
        visible.push({type: s.type, idx, t});
      }
    });
  }

  return visible.sort((a, b) => b.t - a.t);
}

function timeAgo(ts, now) {
  const d = Math.floor((now-ts)/60);
  if (d < 1) return 'just now';
  return d + ' min' + (d===1?'':'s') + ' ago';
}

function renderNews() {
  const now = Math.floor(Date.now()/1000);
  const feed = buildNewsFeed(now);
  const pane = document.getElementById('news-pane');
  const prevScroll = pane.scrollTop;
  pane.innerHTML = '';
  
  if (!feed.length) {
    pane.innerHTML = '<div style="padding:20px;text-align:center;color:var(--glow-dim);font-family:var(--font-alien)">Awaiting uplink...</div>';
    return;
  }
  
  feed.forEach(item => {
    const isAd = item.type === 'ad';
    const data = isAd ? ADS[item.idx] : HEADLINES[item.idx];
    const key = item.type + item.idx;
    const isTranslated = globalTranslated || newsTranslated.has(key);
    const isExpanded = expandedNews.has(key);
    const div = document.createElement('div');
    div.className = 'news-item'+(isAd?' ad':'')+(isTranslated?' translated':'')+(isExpanded?' expanded':'');
    div.dataset.key = key;
    const tagClass = isAd?'ad-tag':(data.tag==='breaking'?'breaking':'standard');
    const tagText = isAd?'SPONSORED':(data.tag==='breaking'?'BREAKING':'DATANET');
    div.innerHTML =
      '<div class="news-meta"><span class="news-tag '+tagClass+'">'+tagText+'</span><span class="news-time">'+timeAgo(item.t,now)+'</span></div>'+
      '<div class="news-headline alien-text">'+data.h+'</div>'+
      '<div class="news-body alien-text">'+data.b+'</div>';
    div.addEventListener('click', function() {
      const k = this.dataset.key;
      if (newsTranslated.has(k)) newsTranslated.delete(k); else newsTranslated.add(k);
      if (expandedNews.has(k)) expandedNews.delete(k); else expandedNews.add(k);
      const t2 = globalTranslated || newsTranslated.has(k);
      this.classList.toggle('translated', t2);
      this.classList.toggle('expanded', expandedNews.has(k));
    });
    pane.appendChild(div);
  });
  
  pane.scrollTop = prevScroll;
}

<script>
let TRACK_ROTATION = JSON.parse(document.getElementById('holofeed-tracks').textContent);

const _TLUTs_ALL=(function(){
  const W=520,H=230;
  function _b(p0,c1,c2,p3,t){const u=1-t;return{x:u*u*u*p0.x+3*u*u*t*c1.x+3*u*t*t*c2.x+t*t*t*p3.x,y:u*u*u*p0.y+3*u*u*t*c1.y+3*u*t*t*c2.y+t*t*t*p3.y};}
  return TRACK_ROTATION.map(track=>{
    const luts={};
    if(!track.segments)return luts;
    track.segments.forEach(seg=>{
      const p0=track.nodes.find(x=>x.id===seg.from),p3=track.nodes.find(x=>x.id===seg.to);
      const px0={x:p0.x*W,y:p0.y*H},px3={x:p3.x*W,y:p3.y*H};
      const c1={x:seg.cp1.x*W,y:seg.cp1.y*H},c2={x:seg.cp2.x*W,y:seg.cp2.y*H};
      let pts=[],cum=0,prev=null;
      for(let i=0;i<=100;i++){const t=i/100,p=_b(px0,c1,c2,px3,t);if(prev)cum+=Math.hypot(p.x-prev.x,p.y-prev.y);pts.push({x:p.x,y:p.y,len:cum});prev=p;}
      luts[seg.id]={pts,totalLen:cum};
    });
    return luts;
  });
})();

const _TMainLen_ALL=TRACK_ROTATION.map((track,ti)=>track.segments?track.segments.filter(s=>s.type==='main').reduce((a,s)=>a+(_TLUTs_ALL[ti][s.id]?.totalLen||0),0):0);
const _TSpdMin_ALL=_TMainLen_ALL.map(l=>12*l/895);
const _TSpdMax_ALL=_TMainLen_ALL.map(l=>20*l/895);

function _TDef(race){return TRACK_ROTATION[race.trackIdx??0]||TRACK_ROTATION[0];}
function _TLuts(race){return _TLUTs_ALL[race.trackIdx??0]||_TLUTs_ALL[0];}

function _TPosAt(lut,arc){
  if(!lut||!lut.pts.length)return{x:0,y:0};
  const c=Math.max(0,Math.min(arc,lut.totalLen));
  for(let i=1;i<lut.pts.length;i++){if(lut.pts[i].len>=c){const a=lut.pts[i-1],b=lut.pts[i],f=(b.len-a.len)>0?(c-a.len)/(b.len-a.len):0;return{x:a.x+f*(b.x-a.x),y:a.y+f*(b.y-a.y)};}}
  const l=lut.pts[lut.pts.length-1];return{x:l.x,y:l.y};
}
function _TChoose(rng,outs,forceShortcut){
  if(outs.length===1)return outs[0];
  const scs=outs.filter(s=>s.type==='shortcut'),mns=outs.filter(s=>s.type==='main');
  if(forceShortcut&&scs.length>0)return scs[Math.floor(rng()*scs.length)];
  const scP=scs.reduce((a,s)=>a+s.prob,0),mP=Math.max(0,1-scP)/Math.max(1,mns.length);
  const es=[...scs.map(s=>({seg:s,p:s.prob})),...mns.map(s=>({seg:s,p:mP}))];
  const rv=rng();let cum=0;for(const e of es){cum+=e.p;if(rv<cum)return e.seg;}return outs[0];
}
function _TStep(st,r,dt,tRace,track,luts,spdMul,forceShortcut){
  if(st.done)return;
  spdMul=spdMul||1;
  const spd=r.baseSpeed*(1+r.amplitude*Math.sin(2*Math.PI*tRace/r.period))*spdMul;
  let adv=Math.max(spd,5)*dt,g=0;
  while(adv>0.001&&g++<30){
    const seg=track.segments.find(s=>s.id===st.segId),lut=luts[st.segId];
    if(!seg||!lut||lut.totalLen===0){st.done=true;return;}
    const rem=lut.totalLen-st.arcPos;
    if(adv>=rem){adv-=rem;if(seg.to===0){st.laps++;st.arcThisLap=0;if(st.laps>=(track.laps||3)){st.done=true;return;}}const outs=track.segments.filter(s=>s.from===seg.to);if(!outs.length){st.done=true;return;}const nx=_TChoose(st.rng,outs,forceShortcut);st.segId=nx.id;st.arcPos=0;}
    else{st.arcPos+=adv;st.arcThisLap+=adv;adv=0;}
  }
}

function makeRacers(seed,trackIdx,namePool){
  trackIdx=trackIdx??0;
  const rng=mulberry32(seed);
  const pool=(namePool&&namePool.length>=6)?namePool:RACER_NAMES;
  const names=pickN(pool,6,rng);
  const track=TRACK_ROTATION[trackIdx]||TRACK_ROTATION[0];
  const trackLen=_TMainLen_ALL[trackIdx]??_TMainLen_ALL[0];
  const smin=track.slowLap?trackLen/track.slowLap:(_TSpdMin_ALL[trackIdx]??_TSpdMin_ALL[0]);
  const smax=track.fastLap?trackLen/track.fastLap:(_TSpdMax_ALL[trackIdx]??_TSpdMax_ALL[0]);
  return names.map((name,i)=>({name,color:RACER_COLORS[i],baseSpeed:smin+rng()*(smax-smin),amplitude:0.008+rng()*0.018,period:8+rng()*16,_seed:seed,_idx:i}));
}


function fastSimulateRaceHealth(racers,trackIdx,bursts){
  const track=TRACK_ROTATION[trackIdx]||TRACK_ROTATION[0];
  const laps=track.laps||3,riskFactor=track.riskFactor||1.0;
  const avgLapTime=((track.fastLap||45)+(track.slowLap||75))/2;
  const trackLen=_TMainLen_ALL[trackIdx]||_TMainLen_ALL[0];
  const maxSpd=trackLen/(track.fastLap||45);
  const deaths=[];
  racers.forEach((r,i)=>{
    const hrng=mulberry32(r._seed*99991+i*17+3);
    const drainVariance=0.7+hrng()*0.8;
    const speedRatio=Math.min(1,Math.max(0,r.baseSpeed/maxSpd));
    const drain=HEALTH_BASE_DRAIN*riskFactor*(0.5+0.5*speedRatio)*drainVariance;
    const myBursts=(bursts||[]).filter(b=>b.racerIdx===i).sort((a,b)=>a.time-b.time);
    let burstPtr=0;
    let health=100,raceTime=0,isDnf=false;
    for(let lap=0;lap<laps&&!isDnf;lap++){
      const lapEnd=raceTime+avgLapTime;
      while(burstPtr<myBursts.length&&myBursts[burstPtr].time<=lapEnd){
        health=myBursts[burstPtr].targetHealth;burstPtr++;
        if(health<=0){isDnf=true;const survived=hrng()<0.75;deaths.push({name:r.name,survived,timeInRace:raceTime});break;}
      }
      if(isDnf)break;
      health=Math.max(0,health-drain*avgLapTime);
      raceTime=lapEnd;
      if(health<=0){isDnf=true;const survived=hrng()<0.75;deaths.push({name:r.name,survived,timeInRace:raceTime});break;}
      const repChance=Math.min(0.9,(100-health)/100);
      if(hrng()<repChance){
        const repT=3+hrng()*4;raceTime+=repT;
        const minH=Math.min(65,health+20);health=minH+hrng()*(100-minH);
      }
    }
  });
  return deaths;
}

function buildDeathLedger(nowSeconds){
  const nowMs=nowSeconds*1000;
  const ledger={};
  const startHourSeed=Math.floor((nowMs-86400000)/3600000);
  const currentHourSeed=Math.floor(nowSeconds/3600);
  let trackCounter=0;
  for(let hourSeed=startHourSeed;hourSeed<=currentHourSeed;hourSeed++){
    const hourStart=hourSeed*3600;
    let seed=hourSeed*1000,t=hourStart;
    const FLASH = 10, COUNTDOWN = 20,PRERACE=10;
    while(t<hourStart+14400&&t<nowSeconds){
      const trackIdx=trackCounter%TRACK_ROTATION.length;trackCounter++;
      const tMs=t*1000;
      let pool=RACER_NAMES.filter(n=>!ledger[n]||tMs-ledger[n].diedAt>=86400000);
      if(pool.length<6){
        const dead=Object.entries(ledger)
          .filter(([n])=>pool.indexOf(n)<0&&ledger[n]&&tMs-ledger[n].diedAt<86400000)
          .sort((a,b)=>a[1].diedAt-b[1].diedAt);
        for(const[name]of dead){if(pool.length>=6)break;pool.push(name);}
      }
      const racers=makeRacers(seed,trackIdx,pool);
      const track=TRACK_ROTATION[trackIdx]||TRACK_ROTATION[0];
      const avgLap=((track.fastLap||45)+(track.slowLap||75))/2;
      const estDur=(track.laps||3)*avgLap+10;
      const ledgerBursts=generateBursts(seed,trackIdx,racers.length,estDur);
      const deaths=fastSimulateRaceHealth(racers,trackIdx,ledgerBursts);
      deaths.forEach(d=>{if(!d.survived)ledger[d.name]={diedAt:(t+d.timeInRace)*1000};});
      t+=estDur+FLASH+COUNTDOWN+PRERACE;seed++;
    }
  }
  const deadNames=new Set(Object.entries(ledger).filter(([,d])=>nowMs-d.diedAt<86400000).map(([n])=>n));
  return{deadNames,ledger};
}

function generateBursts(seed,trackIdx,racerCount,duration){
  const track=TRACK_ROTATION[trackIdx]||TRACK_ROTATION[0];
  const burstMax=track.burstMax||0;
  if(!burstMax)return[];
  const rng=mulberry32(seed*7919+trackIdx*131);
  const count=Math.floor(rng()*(burstMax+1));
  const bursts=[];
  for(let b=0;b<count;b++){
    const racerIdx=Math.floor(rng()*racerCount);
    const time=5+rng()*(Math.max(10,duration-10));
    const knockout=rng()<0.4;
    const targetHealth=knockout?0:5+Math.floor(rng()*15);
    bursts.push({racerIdx,time,knockout,targetHealth});
  }
  bursts.sort((a,b)=>a.time-b.time);
  return bursts;
}

function buildRaceChain(hourSeed,hourStart){
  const{ledger}=buildDeathLedger(hourStart);
  const runLedger=Object.assign({},ledger);
  const chain=[],FLASH=10,COUNTDOWN=20,PRERACE=10;
  let t=hourStart,seed=hourSeed*1000,trackCounter=0;
  while(t<hourStart+14400){
    const trackIdx=trackCounter%TRACK_ROTATION.length;trackCounter++;
    const tMs=t*1000;
    let pool=RACER_NAMES.filter(n=>!runLedger[n]||tMs-runLedger[n].diedAt>=86400000);
    if(pool.length<6){
      const dead=Object.entries(runLedger)
        .filter(([n])=>pool.indexOf(n)<0&&runLedger[n]&&tMs-runLedger[n].diedAt<86400000)
        .sort((a,b)=>a[1].diedAt-b[1].diedAt);
      for(const[name]of dead){if(pool.length>=6)break;pool.push(name);}
    }
    const racers=makeRacers(seed,trackIdx,pool);
    const{duration,winner,finishTimes}=computeRaceDuration(racers,trackIdx);
    const bursts=generateBursts(seed,trackIdx,racers.length,duration);
    const deaths=fastSimulateRaceHealth(racers,trackIdx,bursts);
    deaths.forEach(d=>{if(!d.survived)runLedger[d.name]={diedAt:(t+d.timeInRace)*1000};});
    const laps=(TRACK_ROTATION[trackIdx]||{}).laps||3;
    const raceEnd=t+duration,flashEnd=raceEnd+FLASH,cdEnd=flashEnd+COUNTDOWN,preEnd=cdEnd+PRERACE;
    chain.push({seed,startT:t,raceEnd,flashEnd,cdEnd,preEnd,phaseEnd:preEnd,racers,winner,finishTimes,laps,duration,trackIdx,bursts});
    t=preEnd;seed++;
  }
  return chain;
}

function computeRaceDuration(racers,trackIdx){
  trackIdx=trackIdx??0;
  const track=TRACK_ROTATION[trackIdx]||TRACK_ROTATION[0];
  const luts=_TLUTs_ALL[trackIdx]||_TLUTs_ALL[0];
  const dt=0.05;
  const startSeg=track.segments.find(s=>s.from===0&&s.type==='main')||track.segments[0];
  const states=racers.map((r,i)=>({segId:startSeg.id,arcPos:0,laps:0,arcThisLap:0,rng:mulberry32(r._seed*10+i*919+3),done:false}));
  const finishTimes=new Array(racers.length).fill(null);
  let winner=null;
  for(let t=0;t<600;t+=dt){
    for(let i=0;i<racers.length;i++){
      if(states[i].done)continue;
      _TStep(states[i],racers[i],dt,t,track,luts);
      if(states[i].done&&finishTimes[i]===null){finishTimes[i]=t;if(winner===null)winner=i;}
    }
    if(finishTimes.every(ft=>ft!==null))break;
  }
  finishTimes.forEach((ft,i)=>{if(ft===null)finishTimes[i]=600;});
  if(winner===null)winner=states.reduce((best,s,i)=>s.laps>states[best].laps?i:best,0);
  return{duration:Math.max(...finishTimes),winner,finishTimes};
}

let raceChain = null, lastRaceHour = -1;
let _nextHourChain=null,_nextHourSeed=-1;
let _lastEventTime=-1;

function getRaceState(nowF) {
  const now = nowF;
  const hourSeed = Math.floor(now / 3600);
  const hourStart = hourSeed * 3600;
  if (hourSeed !== lastRaceHour || !raceChain) {
    raceChain=(_nextHourChain&&_nextHourSeed===hourSeed)?_nextHourChain:buildRaceChain(hourSeed,hourStart);
    _nextHourChain=null;_nextHourSeed=-1;
    lastRaceHour = hourSeed;
  }
  for (let i = 0; i < raceChain.length; i++) {
    const r = raceChain[i];
    if (now >= r.startT && now < r.preEnd) {
      const tInRace = now - r.startT;
      if (now < r.raceEnd)   return {phase:'racing',    tInRace, race:r};
      if (now < r.flashEnd)  return {phase:'flash',     tInRace:r.duration, race:r, flashT:now-r.raceEnd};
      if (now < r.cdEnd)     return {phase:'countdown', tInRace:r.duration, race:r, cdLeft:r.cdEnd-now};
      return {phase:'prerace', tInRace:r.duration, race:r, preLeft:r.preEnd-now};
    }
  }
  return {phase:'countdown', tInRace:0, race:raceChain[0], cdLeft:raceChain[0].startT-now};
}

const _TCache={};
function _TBuildPaths(race){
  if(_TCache[race.seed])return _TCache[race.seed];
  const track=_TDef(race),luts=_TLuts(race);
  const riskFactor=track.riskFactor||1.0;
  const trackLen=_TMainLen_ALL[race.trackIdx??0]||_TMainLen_ALL[0];
  const maxSpd=trackLen/(track.fastLap||45);
  const dt=0.05,startSeg=track.segments.find(s=>s.from===0&&s.type==='main')||track.segments[0];
  const maxT=race.duration+15,frames=Math.ceil(maxT/dt)+1;
  const BRAKE_DUR=2.5;
  const events=[];
  const sfNode=track.nodes.find(n=>n.id===0);
  const sfX=sfNode?sfNode.x*520:0,sfY=sfNode?sfNode.y*230:0;

  const hs=race.racers.map((r,i)=>{
    const hrng=mulberry32(r._seed*99991+i*17+3);
    const drainVariance=0.7+hrng()*0.8;
    const limpThreshold=5+Math.floor(hrng()*11);
    const riskTolerance=hrng();
    return{health:100,drainVariance,hrng,limpThreshold,riskTolerance,repairing:false,repairElapsed:0,repairDuration:0,
           repairStartH:0,repairTargetH:100,limping:false,ignoring:false,dnf:false,survived:null,warned:false,limpTriggered:false};
  });

  const paths=race.racers.map((r,i)=>{
    const st={segId:startSeg.id,arcPos:0,laps:0,arcThisLap:0,rng:mulberry32(r._seed*10+i*919+3),done:false};
    const h=hs[i];
    const myBursts=race.bursts?race.bursts.filter(b=>b.racerIdx===i):[];
    let burstPtr=0;
    const positions=[];
    const lapEndTimes=[];
    let bFinT=null;

    for(let fi=0;fi<frames;fi++){
      const timeNow=fi*dt;
      let posX,posY;
      if(h.repairing){posX=sfX;posY=sfY;}
      else{const p=_TPosAt(luts[st.segId]||{pts:[],totalLen:0},st.arcPos);posX=p.x;posY=p.y;}
      let hstate='normal';
      if(h.dnf)hstate='dnf';
      else if(h.repairing)hstate='repairing';
      else if(h.limping)hstate='limping';
      else if(h.health<20)hstate='danger';
      positions.push({x:posX,y:posY,laps:st.laps,arc:st.arcThisLap,health:h.health,state:hstate,survived:h.survived,ignoring:h.ignoring});

      if(h.dnf)continue;

      if(h.repairing){
        h.repairElapsed+=dt;
        const frac=Math.min(1,h.repairElapsed/h.repairDuration);
        h.health=h.repairStartH+frac*(h.repairTargetH-h.repairStartH);
        if(h.repairElapsed>=h.repairDuration){h.repairing=false;h.health=h.repairTargetH;}
        continue;
      }

      if(!st.done){
        const spdMul=h.limping?0.3:1;
        const prevLaps=st.laps;
        _TStep(st,r,dt,timeNow,track,luts,spdMul,h.limping);
        if(st.done&&bFinT===null)bFinT=timeNow;
        if(st.laps>prevLaps){
          lapEndTimes.push(timeNow);
          if(!st.done){
          const isFinalLap=st.laps>=(track.laps||3)-1;
          if(h.limping){
            const snapChance=h.riskTolerance*(isFinalLap?0.65:0.2);
            if(h.hrng()<snapChance){
              h.limping=false;
              events.push({time:timeNow,racerIdx:i,type:'critical',
                message:'⚡ '+r.name.toUpperCase()+' — PUSHING THROUGH DAMAGE — FULL SPEED'});
            } else {
            h.repairing=true;h.limping=false;h.repairElapsed=0;
            h.repairDuration=3+h.hrng()*4;h.repairStartH=h.health;
            const minH=Math.min(65,h.health+20);h.repairTargetH=minH+h.hrng()*(100-minH);
            events.push({time:timeNow,racerIdx:i,type:'repair',
              message:r.name.toUpperCase()+' — EMERGENCY REPAIRS UNDERWAY'});
            }
          } else {
            const repChance=Math.min(0.9,(100-h.health)/100);
            if(h.hrng()<repChance){
              h.repairing=true;h.repairElapsed=0;h.repairDuration=3+h.hrng()*4;
              h.repairStartH=h.health;
              const minH=Math.min(65,h.health+20);h.repairTargetH=minH+h.hrng()*(100-minH);
              events.push({time:timeNow,racerIdx:i,type:'repair',
                message:r.name.toUpperCase()+' — PULLING IN FOR REPAIRS'});
            }
          }
          } // end !st.done
        }
        while(burstPtr<myBursts.length&&myBursts[burstPtr].time<=timeNow){
          const bst=myBursts[burstPtr++];
          if(!h.dnf&&!h.repairing){
            h.health=Math.min(h.health,bst.targetHealth);
            const msg=bst.knockout
              ?'💥 '+r.name.toUpperCase()+' — CATASTROPHIC IMPACT'
              :'⚡ '+r.name.toUpperCase()+' — COLLISION — CRITICAL DAMAGE';
            events.push({time:timeNow,racerIdx:i,type:bst.knockout?'critical':'warning',message:msg});
          }
        }
        const spd=r.baseSpeed*(1+r.amplitude*Math.sin(2*Math.PI*timeNow/r.period))*spdMul;
        const speedRatio=Math.min(1,Math.max(0,spd/maxSpd));
        h.health=Math.max(0,h.health-HEALTH_BASE_DRAIN*riskFactor*(0.5+0.5*speedRatio)*h.drainVariance*(h.limping?0.15:1)*dt);
        if(!h.warned&&h.health<20){
          h.warned=true;
          const msg=INCIDENT_MESSAGES[Math.floor(h.hrng()*INCIDENT_MESSAGES.length)];
          events.push({time:timeNow,racerIdx:i,type:'warning',
            message:'⚠ '+r.name.toUpperCase()+' — '+msg});
        }
        if(!h.limpTriggered&&h.health<h.limpThreshold){
          h.limpTriggered=true;
          const isFinalLap=st.laps>=(track.laps||3)-1;
          const baseIgnore=isFinalLap?0.8:0.3;
          const ignoreChance=Math.min(0.95,baseIgnore+(h.riskTolerance-0.5)*0.3);
          if(h.hrng()<ignoreChance){
            h.ignoring=true;
            events.push({time:timeNow,racerIdx:i,type:'critical',
              message:'⚠ '+r.name.toUpperCase()+' — IGNORING DAMAGE — PUSHING TO FINISH'});
          } else {
            h.ignoring=false;h.limping=true;
            events.push({time:timeNow,racerIdx:i,type:'critical',
              message:'⚠ '+r.name.toUpperCase()+' — REDUCING SPEED — LIMPING TO REPAIR'});
          }
        }
        if(h.health<=0&&!h.dnf){
          h.dnf=true;h.survived=h.hrng()<0.75;st.done=true;
          const pool=h.survived?SURVIVE_MESSAGES:DEATH_MESSAGES;
          const pmsg=pool[Math.floor(h.hrng()*pool.length)];
          events.push({time:timeNow,racerIdx:i,
            type:h.survived?'dnf_survived':'dnf_killed',
            message:(h.survived?'⚡ ':'† ')+r.name.toUpperCase()+' — '+pmsg});
        }
      } else if(bFinT!==null){
        const ot=timeNow-bFinT;
        if(ot<BRAKE_DUR){
          const scale=1-(ot/BRAKE_DUR)*(ot/BRAKE_DUR);
          const brkAdv=r.baseSpeed*(1+r.amplitude*Math.sin(2*Math.PI*bFinT/r.period))*scale*dt;
          if(brkAdv>0.001){
            let adv2=brkAdv,g2=0;
            while(adv2>0.001&&g2++<5){
              const lut2=luts[st.segId]||{pts:[],totalLen:0};
              if(!lut2.totalLen)break;
              const rem2=lut2.totalLen-st.arcPos;
              if(adv2>=rem2){
                adv2-=rem2;
                const seg2=track.segments.find(s=>s.id===st.segId);
                const outs2=seg2?track.segments.filter(s=>s.from===seg2.to&&s.type==='main'):[];
                if(!outs2.length){st.arcPos=lut2.totalLen;break;}
                st.segId=outs2[0].id;st.arcPos=0;
              } else{st.arcPos+=adv2;adv2=0;}
            }
          }
        }
      }
    }
    return{positions,lapEndTimes,finalStatus:h.dnf?(h.survived?'dnf_survived':'dnf_killed'):'finished'};
  });

  events.sort((a,b)=>a.time-b.time);
  const keys=Object.keys(_TCache);if(keys.length>30)delete _TCache[keys[0]];
  _TCache[race.seed]={paths,dt,events};
  return _TCache[race.seed];
}

function getLeaderboard(race,tInRace){
  const data=_TBuildPaths(race);
  const mainLen=_TMainLen_ALL[race.trackIdx??0]||_TMainLen_ALL[0];
  const raceLaps=race.laps||3;
  const t=Math.min(tInRace,race.duration);
  const fi=Math.min(Math.floor(t/data.dt),data.paths[0].positions.length-1);
  return race.racers.map((r,i)=>{
    const pos=data.paths[i].positions[fi];
    const dnf=pos.state==='dnf';
    const finished=!dnf&&pos.laps>=raceLaps;
    const lapEnds=data.paths[i].lapEndTimes||[];
    const completedLaps=pos.laps;
    const lapEnd=completedLaps>0?lapEnds[completedLaps-1]:null;
    const lapStart=completedLaps>1?lapEnds[completedLaps-2]:0;
    const lastLapTime=lapEnd!=null?lapEnd-lapStart:null;
    return{idx:i,name:r.name,color:r.color,laps:pos.laps,
           totalDist:dnf?-1:pos.laps*mainLen+pos.arc,
           finishTime:finished?(race.finishTimes?.[i]??600):null,
           finished,lastLapTime,dnf,survived:pos.survived,state:pos.state,health:pos.health,ignoring:pos.ignoring};
  }).sort((a,b)=>{
    // Finished racers lock in order by finish time — nothing can displace them
    if(a.finished&&b.finished)return a.finishTime-b.finishTime;
    if(a.finished)return -1;
    if(b.finished)return 1;
    // DNF racers always last
    if(a.dnf&&!b.dnf)return 1;
    if(!a.dnf&&b.dnf)return -1;
    // Still racing: sort by current distance
    return b.totalDist-a.totalDist;
  });
}

function formatTime(s) {
  const min = Math.floor(s/60);
  const sec = String((s%60).toFixed(1)).padStart(4,'0');
  return min+':'+sec;
}

const _TCanvasCache={};
function getTrackCanvas(glowColor,dimColor,borderColor,tiOverride){
  const ti=tiOverride!=null?tiOverride:(()=>{const s=getRaceState(Date.now()/1000);return s.race.trackIdx??0;})();
  const cacheKey=ti+'|'+glowColor+(tiOverride!=null?'|ov':'');
  if(_TCanvasCache[cacheKey])return _TCanvasCache[cacheKey];
  const track=TRACK_ROTATION[ti]||TRACK_ROTATION[0];
  const luts=_TLUTs_ALL[ti]||_TLUTs_ALL[0];
  const tc=document.createElement('canvas');tc.width=520;tc.height=230;
  const ctx=tc.getContext('2d'),W=520,H=230;
  function _n(id){return track.nodes.find(x=>x.id===id);}
  function _px(nd){return{x:nd.x*W,y:nd.y*H};}
  track.segments.filter(s=>s.type==='shortcut').forEach(seg=>{
    const p0=_px(_n(seg.from)),p3=_px(_n(seg.to));
    const c1={x:seg.cp1.x*W,y:seg.cp1.y*H},c2={x:seg.cp2.x*W,y:seg.cp2.y*H};
    ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.bezierCurveTo(c1.x,c1.y,c2.x,c2.y,p3.x,p3.y);
    ctx.strokeStyle=dimColor+'88';ctx.lineWidth=6;ctx.setLineDash([5,5]);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.bezierCurveTo(c1.x,c1.y,c2.x,c2.y,p3.x,p3.y);
    ctx.strokeStyle=glowColor+'44';ctx.lineWidth=2;ctx.stroke();
  });
  track.segments.filter(s=>s.type==='main').forEach(seg=>{
    const p0=_px(_n(seg.from)),p3=_px(_n(seg.to));
    const c1={x:seg.cp1.x*W,y:seg.cp1.y*H},c2={x:seg.cp2.x*W,y:seg.cp2.y*H};
    ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.bezierCurveTo(c1.x,c1.y,c2.x,c2.y,p3.x,p3.y);
    ctx.strokeStyle=borderColor;ctx.lineWidth=16;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();ctx.lineCap='butt';
    ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.bezierCurveTo(c1.x,c1.y,c2.x,c2.y,p3.x,p3.y);
    ctx.strokeStyle=dimColor;ctx.lineWidth=0.5;ctx.setLineDash([8,6]);ctx.stroke();ctx.setLineDash([]);
  });
  const sf0=_n(0),sfx=sf0.x*W,sfy=sf0.y*H;
  const outSeg=track.segments.find(s=>s.from===0&&s.type==='main');
  let ang=Math.PI/2;
  if(outSeg&&luts[outSeg.id]?.pts.length>1){
    const a=luts[outSeg.id].pts[0],b=luts[outSeg.id].pts[2]||luts[outSeg.id].pts[1];
    ang=Math.atan2(b.y-a.y,b.x-a.x)+Math.PI/2;
  }
  ctx.save();ctx.translate(sfx,sfy);ctx.rotate(ang);
  ctx.strokeStyle=glowColor;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(-14,0);ctx.lineTo(14,0);ctx.stroke();ctx.restore();
  ctx.fillStyle=dimColor;ctx.font='7px "Share Tech Mono"';ctx.fillText('S/F',sfx+4,sfy-6);
  _TCanvasCache[cacheKey]=tc;
  setTimeout(()=>{delete _TCanvasCache[cacheKey];},600000);
  return tc;
}

function _showRacerMsg(racerIdx,ev){
  const inner=_racerMsgInners[racerIdx];
  if(!inner)return;
  clearTimeout(_racerMsgTimers[racerIdx]);
  const isKill=ev.type==='dnf_killed';
  const isCrit=ev.type==='critical'||ev.type==='warning';
  let msg=ev.message;
  if(ev.racerName){msg=msg.replace(ev.racerName+' \u2014 ','').replace(ev.racerName,'');}
  msg=msg.replace(/^[\u26a0\u26a1\uD83D\uDCA5\u2020\s]+/,'').trim();
  inner.textContent=msg;
  inner.style.color=isKill?'#ff5555':isCrit?'var(--amber)':'var(--glow-dim)';
  // start ticker from right edge of container
  const container=inner.parentElement;
  const containerW=container?container.offsetWidth||100:100;
  _racerTickerX[racerIdx]=containerW+8;
  inner.style.transform='translateX('+(containerW+8)+'px)';
  const dur=isKill?9000:6000;
  _racerMsgTimers[racerIdx]=setTimeout(()=>{inner.textContent='';inner.style.transform='';},dur);
}

function _queueEvent(ev){
  if(ev.racerIdx!=null)_showRacerMsg(ev.racerIdx,ev);
}

function renderRace(){
  if(_dom('tab-race').style.display==='none')return;
  const nowF=Date.now()/1000;
  const state=getRaceState(nowF);
  let{race,tInRace,phase}=state;
  const canvas=_dom('race-canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const theme=THEMES[currentTheme];
  const preEl=_dom('prerace-overlay');
  const trackLabelEl=_dom('race-track-label');
  const statusEl=_dom('race-status');
  ctx.clearRect(0,0,W,H);ctx.fillStyle=theme.bg;ctx.fillRect(0,0,W,H);
  if(phase==='prerace'){
    const ri=raceChain.indexOf(race);
    const nextRace=ri>=0?raceChain[ri+1]:null;
    const nextTrackIdx=nextRace?(nextRace.trackIdx??0):((race.trackIdx+1)%TRACK_ROTATION.length);
    ctx.globalAlpha=0.3;ctx.drawImage(getTrackCanvas(theme.glow,theme.glowDim,theme.border2,nextTrackIdx),0,0);ctx.globalAlpha=1;
    const nextTrackName=(TRACK_ROTATION[nextTrackIdx]||TRACK_ROTATION[0]).name;
    if(trackLabelEl)trackLabelEl.textContent='▷ INCOMING: '+nextTrackName+' ◁';
    statusEl.textContent='INCOMING RACE — STAND BY';statusEl.style.color='var(--amber)';
    if(preEl){preEl.style.display='block';preEl.textContent=String(Math.ceil(state.preLeft||1));}
    return;
  }
  if(preEl)preEl.style.display='none';
  if((phase==='countdown'||phase==='flash')&&raceChain){
    const _ri=raceChain.indexOf(race);const _nr=_ri>=0?raceChain[_ri+1]:null;
    if(_nr&&!_TCache[_nr.seed]){const _idle=window.requestIdleCallback||((cb)=>setTimeout(cb,50));_idle(()=>{if(!_TCache[_nr.seed])_TBuildPaths(_nr);});}
  }
  ctx.drawImage(getTrackCanvas(theme.glow,theme.glowDim,theme.border2),0,0);
  const t=tInRace;
  const pathData=_TBuildPaths(race);
  if(pathData.events){
    const fired=pathData.events.filter(e=>e.time>_lastEventTime&&e.time<=t);
    fired.forEach(e=>{
      if(e.racerIdx!=null&&race.racers[e.racerIdx]){
        e.racerColor=race.racers[e.racerIdx].color;
        e.racerName=race.racers[e.racerIdx].name.toUpperCase();
      }
      _queueEvent(e);
    });
    if(fired.length>0)_lastEventTime=Math.max(...fired.map(e=>e.time));
  }
  const fi=Math.min(Math.floor(t/pathData.dt),pathData.paths[0].positions.length-2);
  const frac=(t%pathData.dt)/pathData.dt;
  const nowMs=Date.now();
  function _ipos(i){const a=pathData.paths[i].positions[fi],b=pathData.paths[i].positions[fi+1]||a;return{x:a.x+frac*(b.x-a.x),y:a.y+frac*(b.y-a.y),laps:a.laps,arc:a.arc,health:a.health,state:a.state,survived:a.survived};}

  // Leaderboard needed for live rank labels — compute before dot draw
  const raceLaps=race.laps||3;
  const lb=getLeaderboard(race,tInRace);
  const rankMap={};lb.forEach((e,pos)=>{rankMap[e.idx]=pos+1;});

  // Detect new DNFs and spawn explosions
  race.racers.forEach((r,i)=>{
    const pos=_ipos(i);
    if(pos.state==='dnf'&&_racerPrevState[i]!=='dnf'){
      const particles=Array.from({length:6},()=>{
        const ang=Math.random()*2*Math.PI,dist=10+Math.random()*16;
        return{dx:Math.cos(ang)*dist,dy:Math.sin(ang)*dist};
      });
      _explosions.push({x:pos.x,y:pos.y,color:r.color,startMs:nowMs,particles});
    }
    _racerPrevState[i]=pos.state;
  });

  // Trails
  race.racers.forEach((r,i)=>{
    const pos=_ipos(i);if(pos.state==='dnf')return;
    const key=race.seed+'_'+i;
    if(!trailBuffers[key])trailBuffers[key]=[];
    const trail=trailBuffers[key];
    trail.push({x:pos.x,y:pos.y});if(trail.length>18)trail.shift();
    for(let j=1;j<trail.length;j++){ctx.globalAlpha=(j/trail.length)*0.35;ctx.beginPath();ctx.moveTo(trail[j-1].x,trail[j-1].y);ctx.lineTo(trail[j].x,trail[j].y);ctx.strokeStyle=r.color;ctx.lineWidth=3;ctx.stroke();}
    ctx.globalAlpha=1;
  });

  // Dots
  race.racers.forEach((r,i)=>{
    const pos=_ipos(i);const{state,health}=pos;
    if(state==='dnf')return;
    let visible=true;
    if(state==='danger'){visible=Math.sin(nowMs/167*Math.PI)>0;}
    else if(state==='repairing'){const hz=0.5+(health/100)*3.5;visible=Math.sin(nowMs/1000*hz*2*Math.PI)>0;}
    if(!visible)return;
    const px=pos.x,py=pos.y;
    const glowColor=state==='danger'?'#ff3333':state==='limping'?'#ffaa00':state==='repairing'?'#44ddff':r.color;
    ctx.beginPath();ctx.arc(px,py,10,0,2*Math.PI);ctx.fillStyle=glowColor+'55';ctx.fill();
    ctx.beginPath();ctx.arc(px,py,5.5,0,2*Math.PI);ctx.fillStyle=r.color;ctx.fill();
    ctx.strokeStyle='#fff3';ctx.lineWidth=0.8;ctx.stroke();
    const label=state==='danger'?'!':state==='repairing'?'\u00B7':String(rankMap[i]||i+1);
    ctx.fillStyle='#000';ctx.font='bold 8px "Share Tech Mono"';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,px,py);
  });

  // Explosions + persistent DNF markers
  for(let ei=_explosions.length-1;ei>=0;ei--){
    const ex=_explosions[ei];
    const age=(nowMs-ex.startMs)/1000;
    if(age>8){_explosions.splice(ei,1);continue;}
    // Flash + expanding fill (0–700ms)
    if(age<0.7){
      const tp=age/0.7;
      const fr=5+tp*26,fa=1-tp;
      ctx.beginPath();ctx.arc(ex.x,ex.y,fr,0,2*Math.PI);
      ctx.fillStyle='rgba(255,200,80,'+(fa*0.85)+')';ctx.fill();
      ctx.beginPath();ctx.arc(ex.x,ex.y,fr*0.4,0,2*Math.PI);
      ctx.fillStyle='rgba(255,255,255,'+fa+')';ctx.fill();
    }
    // Expanding ring (0–1200ms)
    if(age<1.2){
      const tp=age/1.2,rr=8+tp*26,ra=(1-tp)*0.7;
      ctx.beginPath();ctx.arc(ex.x,ex.y,rr,0,2*Math.PI);
      ctx.strokeStyle='rgba(255,160,40,'+ra+')';ctx.lineWidth=2;ctx.stroke();
    }
    // Debris particles (0–1500ms)
    if(age<1.5){
      const tp=age/1.5,f=1-Math.pow(1-tp,2);
      const pa=Math.max(0,(1-tp)*0.9);
      const hexA=Math.round(pa*255).toString(16).padStart(2,'0');
      ex.particles.forEach(p=>{
        ctx.beginPath();ctx.arc(ex.x+p.dx*f,ex.y+p.dy*f,2.2,0,2*Math.PI);
        ctx.fillStyle=ex.color+hexA;ctx.fill();
      });
    }
    // Persistent DNF marker — small X that lingers and slowly fades (1.5–8s)
    if(age>1.2){
      const fade=Math.max(0,1-(age-1.2)/6.8);
      const ma=fade*0.55,ms=4.5;
      ctx.strokeStyle='rgba(255,80,80,'+ma+')';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(ex.x-ms,ex.y-ms);ctx.lineTo(ex.x+ms,ex.y+ms);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex.x+ms,ex.y-ms);ctx.lineTo(ex.x-ms,ex.y+ms);ctx.stroke();
    }
  }

  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  const trackName=(TRACK_ROTATION[race.trackIdx??0]||TRACK_ROTATION[0]).name;
  if(trackLabelEl)trackLabelEl.textContent='⬡ '+trackName+' ⬡';
  if(phase==='racing'&&tInRace>15&&lb.every(e=>e.dnf||e.laps>=raceLaps))phase='flash';
  if(phase==='countdown'){
    const cdLeft=Math.ceil(state.cdLeft);
    let nextName=null;
    if(raceChain&&TRACK_ROTATION.length>1){const ri=raceChain.indexOf(race);const nr=ri>=0?raceChain[ri+1]:null;if(nr)nextName=(TRACK_ROTATION[nr.trackIdx??0]||TRACK_ROTATION[0]).name;}
    statusEl.textContent=nextName?'— NEXT: '+nextName+' — IN '+cdLeft+'s —':'— NEW RACE STARTING IN '+cdLeft+'s —';
    statusEl.style.color='var(--amber)';
  } else if(phase==='flash'){
    const actualWinner=lb.find(e=>e.finished)||lb[0];
    statusEl.textContent='⬡ '+actualWinner.name.toUpperCase()+' WINS! ⬡';
    statusEl.style.color=actualWinner.color;
  } else {
    const lead=lb.find(e=>!e.dnf);
    statusEl.textContent='RACE IN PROGRESS — LEAD: '+(lead?lead.name.toUpperCase():'');
    statusEl.style.color='var(--glow)';
  }
  const isRaceTab=_dom('tab-race').classList.contains('active');
  if(isRaceTab){
    const nowMs=Date.now();
    const dtTicker=Math.min(0.1,_lastTickerMs?((nowMs-_lastTickerMs)/1000):0);
    _lastTickerMs=nowMs;
    const actualWinnerName=(phase==='flash')?(lb.find(e=>e.finished)||lb[0]).name:'';
    lb.forEach((entry,pos)=>{
      const row=_racerRows[entry.idx];if(!row)return;
      _racerIdxToRow[entry.idx]=pos;
      row.style.top=(pos*ROW_HEIGHT)+'px';
      const isWinner=phase==='flash'&&entry.name===actualWinnerName;
      row.className='lb-row'+(isWinner?' winner-flash':'');
      const lapsText=entry.dnf?'DNF':entry.laps+'/'+raceLaps;
      const hp=entry.dnf?0:Math.round(entry.health||100);
      const hText=hp+'%';
      const hColor=hp<=0?'#555555':hp<15?'#ff3333':hp<30?'#ff6600':hp<50?'#ffaa00':hp<70?'#ffcc44':'var(--glow-dim)';
      const ltText=entry.lastLapTime!=null?entry.lastLapTime.toFixed(1)+'s':'—';
      const spans=row.children;
      spans[0].textContent=pos+1;
      spans[1].textContent=entry.name;spans[1].style.color=entry.dnf?(entry.survived?'#666666':'#444444'):entry.color;
      if(typeof globalTranslated!=='undefined'&&!globalTranslated&&!entry.dnf)spans[1].style.fontFamily='var(--font-alien)';
      else spans[1].style.fontFamily='';
      // spans[3-5] are health, laptime, laps
      spans[3].textContent=hText;spans[3].style.color=hColor;
      spans[4].textContent=ltText;
      spans[5].textContent=lapsText;
      // ticker scroll
      const inner=_racerMsgInners[entry.idx];
      if(inner&&inner.textContent){
        _racerTickerX[entry.idx]-=38*dtTicker;
        const containerW=spans[2].offsetWidth||100;
        if(_racerTickerX[entry.idx]<-(inner.scrollWidth||80))_racerTickerX[entry.idx]=containerW+8;
        inner.style.transform='translateX('+_racerTickerX[entry.idx]+'px)';
      }
    });
  }
  // Pre-build next hour's chain when within 3 minutes of hour boundary
  const _upcoming=Math.floor((nowF+180)/3600);
  if(_upcoming>Math.floor(nowF/3600)&&_upcoming!==_nextHourSeed){
    _nextHourSeed=_upcoming;
    const _idle=window.requestIdleCallback||((cb)=>setTimeout(cb,100));
    _idle(()=>{if(_nextHourSeed===_upcoming)_nextHourChain=buildRaceChain(_upcoming,_upcoming*3600);});
  }
}

// RAF loop for smooth race
const _domCache={};
function _dom(id){return _domCache[id]||(_domCache[id]=document.getElementById(id));}

let raceRafId = null;
function raceLoop() {
  if (_dom('tab-race').classList.contains('active')) {
    renderRace();
  }
  raceRafId = requestAnimationFrame(raceLoop);
}
const ROW_HEIGHT=24;
(function(){
  const lbEl=document.getElementById('lb-rows');
  lbEl.style.position='relative';
  lbEl.style.height=(6*ROW_HEIGHT)+'px';
  for(let i=0;i<6;i++){
    const row=document.createElement('div');
    row.className='lb-row';
    row.style.top=(i*ROW_HEIGHT)+'px';
    row.innerHTML='<span class="lb-pos"></span><span class="lb-name"></span><span class="lb-msg"><span class="lb-msg-inner"></span></span><span class="lb-health"></span><span class="lb-laptime"></span><span class="lb-laps"></span>';
    lbEl.appendChild(row);
    _racerRows.push(row);
    _racerMsgInners.push(row.querySelector('.lb-msg-inner'));
    _racerTickerX.push(9999);
  }
})();
raceLoop();

// Clean up old trails when race changes
let lastRaceSeed = -1;
setInterval(() => {
  const nowF = Date.now()/1000;
  const state = getRaceState(nowF);
  if (state.race.seed !== lastRaceSeed) {
    // Clear trails from old race
    Object.keys(trailBuffers).forEach(k => {
      if (!k.startsWith(state.race.seed+'_')) delete trailBuffers[k];
    });
    lastRaceSeed = state.race.seed;
    _lastEventTime = -1;
    _explosions.length = 0;
    _racerPrevState.fill('normal');
    _racerMsgTimers.forEach((t,i)=>{clearTimeout(t);_racerMsgTimers[i]=null;});
    _racerMsgInners.forEach((inner,i)=>{if(inner){inner.textContent='';inner.style.transform='';}_racerTickerX[i]=9999;});
  }
}, 2000);



// ============================================================
// STOCKS
// ============================================================
// ============================================================
// STOCK EXCHANGE LISTINGS
// ============================================================
// Each entry is a company shown on the Exchange tab with a live line graph.
// Fields:
//   name — Full company name (shown in Aurebesh by default, translatable)
//   sym  — Short ticker symbol (always shown in monospace, e.g. "KDY")
//   base — Starting/baseline price in credits (the graph centers around this)
//   vol  — Volatility factor (0.01 = very stable, 0.05 = very jumpy)
//          Higher vol means bigger price swings per 30-second tick.
//
// TO ADD A STOCK: paste a new { name:'...', sym:'...', base:NNN, vol:0.0NN } line.
// TO REMOVE:      delete its line (and the trailing comma).
// Prices update every 30 seconds and are seeded to be identical for all viewers.
// ============================================================
const STOCKS = [
  {
    name:"Kuat Drive Yards",
    sym:"KDY",
    base:1420,
    vol:0.015
  },
  {
    name:"Czerka Corporation",
    sym:"CZRK",
    base:847,
    vol:0.022
  },
  {
    name:"Barsha Corp",
    sym:"BRSH",
    base:312,
    vol:0.03
  },
  {
    name:"Holowan Mechanicals",
    sym:"HLWN",
    base:589,
    vol:0.025
  },
  {
    name:"TaggeCo Industries",
    sym:"TGCO",
    base:734,
    vol:0.018
  },
  {
    name:"Outer Rim Commodities",
    sym:"ORMX",
    base:198,
    vol:0.035
  }
];

function stockPrice(stock, seed, step) {
  let price = stock.base;
  for (let i = 0; i <= step; i++) {
    const rng = mulberry32(seed*9999 + stock.sym.charCodeAt(0)*31 + i);
    price = Math.max(price*0.5, price + (rng()-0.48)*stock.vol*price);
  }
  return price;
}

let lastStockStep = -1;
function renderStocks() {
  const now = Math.floor(Date.now()/1000);
  const stockSeed = Math.floor(now/3600);
  const currentStep = Math.floor((now%3600)/30);
  const pane = document.getElementById('stocks-pane');
  if (currentStep === lastStockStep && pane.children.length > 0) return;
  lastStockStep = currentStep;
  pane.innerHTML = '';

  STOCKS.forEach(stock => {
    const card = document.createElement('div');
    card.className = 'stock-card';
    const HISTORY = 20;
    const prices = [];
    for (let s = Math.max(0, currentStep-HISTORY+1); s <= currentStep; s++) prices.push(stockPrice(stock,stockSeed,s));
    const cur = prices[prices.length-1];
    const prev = prices.length>1?prices[prices.length-2]:cur;
    const change = cur-prev;
    const pct = (change/prev*100).toFixed(2);
    const isUp = change >= 0;
    card.innerHTML =
      '<div class="stock-header">'+
        '<div><div class="stock-name alien-text">'+stock.name+'</div><div class="stock-ticker-sym">'+stock.sym+'</div></div>'+
        '<div style="text-align:right"><div class="stock-price '+(isUp?'up':'down')+'">'+cur.toFixed(2)+' cr</div><div class="stock-change '+(isUp?'up':'down')+'">'+(isUp?'▲':'▼')+' '+Math.abs(pct)+'%</div></div>'+
      '</div>'+
      '<canvas class="stock-chart-canvas" width="860" height="60"></canvas>';
    pane.appendChild(card);
    const canvas = card.querySelector('canvas');
    const ctx = canvas.getContext('2d');
    const W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);
    // Chart background
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0,0,W,H);
    const minP=Math.min(...prices), maxP=Math.max(...prices), range=maxP-minP||1;
    const PAD = 10;
    const pts = prices.map((p,i) => ({
      x: (i/(prices.length-1))*(W-PAD*2)+PAD,
      y: H-PAD-((p-minP)/range)*(H-PAD*2)
    }));
    // Subtle horizontal grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    [0.25,0.5,0.75].forEach(frac => {
      const y = PAD + frac*(H-PAD*2);
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    });
    // Fill gradient
    const fillGrad = ctx.createLinearGradient(0,0,0,H);
    if (isUp) { fillGrad.addColorStop(0,'rgba(78,207,54,0.28)'); fillGrad.addColorStop(1,'rgba(78,207,54,0.03)'); }
    else       { fillGrad.addColorStop(0,'rgba(192,48,48,0.28)');  fillGrad.addColorStop(1,'rgba(192,48,48,0.03)'); }
    ctx.beginPath(); ctx.moveTo(pts[0].x,H);
    pts.forEach(pt=>ctx.lineTo(pt.x,pt.y));
    ctx.lineTo(pts[pts.length-1].x,H); ctx.closePath();
    ctx.fillStyle = fillGrad; ctx.fill();
    // Line — glow pass
    ctx.beginPath(); pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y));
    ctx.strokeStyle=isUp?'rgba(78,207,54,0.35)':'rgba(192,48,48,0.35)';
    ctx.lineWidth=5; ctx.stroke();
    // Line — sharp pass
    ctx.beginPath(); pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y));
    ctx.strokeStyle=isUp?'#6fff55':'#ff5555'; ctx.lineWidth=2; ctx.stroke();
    // Endpoint dot
    const last=pts[pts.length-1];
    ctx.beginPath(); ctx.arc(last.x,last.y,4.5,0,2*Math.PI);
    ctx.fillStyle=isUp?'#6fff55':'#ff5555'; ctx.fill();
    ctx.beginPath(); ctx.arc(last.x,last.y,2,0,2*Math.PI);
    ctx.fillStyle='#fff'; ctx.fill();
  });
}

// ============================================================
// MAIN LOOP — non-race updates on 1s interval
// ============================================================
let newsTimer = 0;
function mainLoop() {
  updateClock();
  const now = Date.now();
  if (now - newsTimer > 15000) { renderNews(); newsTimer = now; }
  const activeTab = document.querySelector('.tab-pane.active').id.replace('tab-','');
  if (activeTab==='stocks') renderStocks();
  if (activeTab==='news') renderNews();
}

setInterval(mainLoop, 1000);
mainLoop();
applyTheme(currentTheme);

  });
})();
