  <style>
    @font-face {
      font-family: 'Aurebesh';
      src: url('../toypad-system-backup/AurebeshAF-Canon.otf') format('opentype');

    :root {
      --bg:         #08080a;
      --text:       #9090a8;
      --accent:     #c0c0d0;
      --border:     #222230;
      --dim:        #101018;
      --font-main:  'Share Tech Mono', monospace;
      --font-title: 'Orbitron', sans-serif;
      --font-aur:   'Aurebesh', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.09) 2px, rgba(0,0,0,0.09) 4px);
      pointer-events: none; z-index: 9000;
      animation: scanline-flicker 7s ease-in-out infinite;
    }
    @keyframes scanline-flicker {
      0%, 90%, 100% { opacity: 1; }
      91%   { opacity: 0.6; }
      91.4% { opacity: 1; }
      94%   { opacity: 0.8; }
      94.3% { opacity: 1; }
    }

    .page-scan-roll {
      position: fixed; left: 0; right: 0; top: 0; height: 120px;
      background: linear-gradient(to bottom,
        transparent 0%, rgba(255,255,255,0.01) 35%,
        rgba(255,255,255,0.025) 50%, rgba(255,255,255,0.01) 65%, transparent 100%);
      pointer-events: none; z-index: 9001;
      animation: scanroll 9s linear infinite;
    }
    @keyframes scanroll {
      0%   { transform: translateY(-15vh); }
      100% { transform: translateY(110vh); }
    }

    .hud-clock {
      position: fixed; top: 0.75rem; right: 1.1rem;
      font-size: 0.65rem; letter-spacing: 0.2em;
      color: var(--accent); opacity: 0.55;
      z-index: 9002; pointer-events: none;
    }

    body.hi-contrast {
      --text: #ffffff; --accent: #ffffff; --border: #555;
    }
    body.hi-contrast .page-scanlines { display: none; }
    body.hi-contrast .page-scan-roll { display: none; }
    body.hi-contrast .hud-clock      { opacity: 0.9; }

    body.aurebesh-mode .page-title,
    body.aurebesh-mode .page-subtitle,
    body.aurebesh-mode .entry-name,
    body.aurebesh-mode .entry-occupation,
    body.aurebesh-mode .classify-tag,

    body.aurebesh-mode .hc-toggle-btn,

    }

    /* ÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂ Roster list ÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂ */
    #roster-list { display: flex; flex-direction: column; }

    .roster-entry {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .roster-entry:first-child { border-top: 1px solid var(--border); }
    .roster-entry:hover { background: rgba(240,192,96,0.04); border-bottom-color: var(--accent); }
    .roster-entry:hover .entry-name { color: var(--accent); }

    /* Thumbnail with CRT overlay */
    .roster-thumb-wrap {
      flex-shrink: 0;
      position: relative;
      width: 48px;
      height: 64px;
    }
    .roster-thumb {
      width: 48px;
      height: 64px;
      object-fit: cover;
      object-position: top center;
      border: 1px solid var(--border);
      border-radius: 1px;
      display: block;
      background: var(--dim);
    }
    .roster-thumb-placeholder {
      width: 48px; height: 64px;
      border: 1px solid var(--border); border-radius: 1px;
      background: var(--dim);
      display: flex; align-items: center; justify-content: center;
    }
    .roster-thumb-placeholder svg { width: 24px; height: 24px; opacity: 0.2; }
    /* CRT scanline overlay on thumbnail */
    .roster-thumb-crt {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg,
        transparent 0px, transparent 1px,
        rgba(0,0,0,0.25) 1px, rgba(0,0,0,0.25) 2px);
      pointer-events: none;
      border-radius: 1px;
    }

    /* Entry info */
    .roster-info { flex: 1; min-width: 0; }
    .entry-name {
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      color: var(--text);
      transition: color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry-occupation {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      opacity: 0.45;
      margin-top: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-arrow {
      flex-shrink: 0;
      font-size: 0.7rem;
      opacity: 0.25;
      color: var(--accent);
    }
    .roster-entry:hover .entry-arrow { opacity: 0.7; }

    /* Empty state */
    .roster-empty {
      text-align: center;
      padding: 3rem 1rem;
      opacity: 0.35;
      font-size: 0.75rem;
