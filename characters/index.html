<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PERSONS OF INTEREST // CANTINA OBSCURA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Electrolize&amp;display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Aurebesh';
      src: url('../toypad-system-backup/AurebeshAF-Canon.otf') format('opentype');
      font-weight: normal; font-style: normal;
    }

    :root {
      --bg:         #08080a;
      --text:       #9090a8;
      --accent:     #c0c0d0;
      --border:     #222230;
      --dim:        #101018;
      --panel-bg:   rgba(20,15,30,0.88);
      --hover-tint: rgba(192,192,210,0.04);
      --font-main:  'Electrolize', sans-serif;
      --font-title: 'Orbitron', sans-serif;
      --font-aur:   'Aurebesh', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.09) 2px, rgba(0,0,0,0.09) 4px);
      pointer-events: none; z-index: 9000;
      animation: scanline-flicker 7s ease-in-out infinite;
    }
    @keyframes scanline-flicker {
      0%, 90%, 100% { opacity: 1; }
      91%   { opacity: 0.6; }
      91.4% { opacity: 1; }
      94%   { opacity: 0.8; }
      94.3% { opacity: 1; }
    }

    .page-scan-roll {
      position: fixed; left: 0; right: 0; top: 0; height: 120px;
      background: linear-gradient(to bottom,
        transparent 0%, rgba(255,255,255,0.01) 35%,
        rgba(255,255,255,0.025) 50%, rgba(255,255,255,0.01) 65%, transparent 100%);
      pointer-events: none; z-index: 9001;
      animation: scanroll 9s linear infinite;
    }
    @keyframes scanroll {
      0%   { transform: translateY(-15vh); }
      100% { transform: translateY(110vh); }
    }

    .hud-clock {
      position: fixed; top: 0.75rem; right: 1.1rem;
      font-size: 0.65rem; letter-spacing: 0.2em;
      color: var(--accent); opacity: 0.55;
      z-index: 9002; pointer-events: none;
    }

    body.hi-contrast {
      --text: #ffffff; --accent: #ffffff; --border: #555;
    }
    body.hi-contrast .page-scanlines { display: none; }
    body.hi-contrast .page-scan-roll { display: none; }
    body.hi-contrast .hud-clock      { opacity: 0.9; }

    body.aurebesh-mode .page-title,
    body.aurebesh-mode .page-subtitle,
    body.aurebesh-mode .entry-name,
    body.aurebesh-mode .entry-occupation,
    body.aurebesh-mode .classify-tag,
    body.aurebesh-mode .aurebesh-toggle-btn,
    body.aurebesh-mode .hc-toggle-btn,
    body.aurebesh-mode .footer-line {
      font-family: var(--font-aur); letter-spacing: 0.05em;
    }

    /* ─────── Outer container ─────── */
    .datapad {
      max-width: 800px;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      background: var(--panel-bg);
      animation: crt-flicker 10s ease-in-out infinite;
    }
    @keyframes crt-flicker {
      0%,100%{opacity:1} 92%{opacity:1} 92.3%{opacity:.91} 92.6%{opacity:1} 95.8%{opacity:.97} 96%{opacity:1}
    }

    /* ─────── Top bar ─────── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 0.5rem;
    }
    .top-bar-left  { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .classify-tag {
      font-size: 0.6rem; letter-spacing: 0.2em;
      color: var(--accent); border: 1px solid var(--accent);
      border-radius: 2px; padding: 0.15rem 0.5rem; opacity: 0.7;
    }
    .aurebesh-toggle-btn, .hc-toggle-btn {
      font-family: var(--font-main); font-size: 0.62rem; letter-spacing: 0.12em;
      color: var(--text); background: transparent;
      border: 1px solid var(--border); border-radius: 3px;
      padding: 0.2rem 0.55rem; cursor: pointer; opacity: 0.6;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .aurebesh-toggle-btn:hover, .hc-toggle-btn:hover { opacity: 1; border-color: var(--text); }
    .aurebesh-toggle-btn.active, .hc-toggle-btn.active { border-color: var(--accent); color: var(--accent); opacity: 1; }

    /* ─────── Page heading ─────── */
    .page-header { margin-bottom: 1.5rem; }
    .page-title {
      font-family: var(--font-title);
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }
    .page-subtitle {
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      opacity: 0.4;
    }

    /* ─────── Roster list ─────── */
    #roster-list { display: flex; flex-direction: column; }

    .roster-entry {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .roster-entry:first-child { border-top: 1px solid var(--border); }
    .roster-entry:hover { background: var(--hover-tint); border-bottom-color: var(--accent); }
    .roster-entry:hover .entry-name { color: var(--accent); }

    /* Thumbnail with CRT overlay */
    .roster-thumb-wrap {
      flex-shrink: 0;
      position: relative;
      width: 48px;
      height: 64px;
    }
    .roster-thumb {
      width: 48px;
      height: 64px;
      object-fit: cover;
      object-position: top center;
      border: 1px solid var(--border);
      border-radius: 1px;
      display: block;
      background: var(--dim);
    }
    .roster-thumb-placeholder {
      width: 48px; height: 64px;
      border: 1px solid var(--border); border-radius: 1px;
      background: var(--dim);
      display: flex; align-items: center; justify-content: center;
    }
    .roster-thumb-placeholder svg { width: 24px; height: 24px; opacity: 0.2; }
    /* CRT scanline overlay on thumbnail */
    .roster-thumb-crt {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg,
        transparent 0px, transparent 1px,
        rgba(0,0,0,0.25) 1px, rgba(0,0,0,0.25) 2px);
      pointer-events: none;
      border-radius: 1px;
    }

    /* Entry info */
    .roster-info { flex: 1; min-width: 0; }
    .entry-name {
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      color: var(--text);
      transition: color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry-occupation {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      opacity: 0.45;
      margin-top: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-arrow {
      flex-shrink: 0;
      font-size: 0.7rem;
      opacity: 0.25;
      color: var(--accent);
    }
    .roster-entry:hover .entry-arrow { opacity: 0.7; }

    /* Empty state */
    .roster-empty {
      text-align: center;
      padding: 3rem 1rem;
      opacity: 0.35;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
    }

    /* ─────── Footer ─────── */
    .footer-line {
      margin-top: 1.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      opacity: 0.35;
      text-align: center;
    }

    /* ─────── Mobile ─────── */
    @media (max-width: 500px) {
      body { padding: 1rem 0.5rem 3rem; }
      .datapad { padding: 1rem; }
      .roster-entry { gap: 0.75rem; padding: 0.6rem 0.5rem; }
    }
  </style>
</head>
<body>

  <div class="page-scanlines"></div>
  <div class="page-scan-roll"></div>
  <div class="hud-clock" id="hud-clock">00:00:00</div>

  <div class="datapad">

    <!-- Top bar -->
    <div class="top-bar">
      <div class="top-bar-left">
        <a class="classify-tag" href="https://flint-inferno.github.io/cantina-obscura/holonet/holofeed-main.html" style="text-decoration:none;cursor:pointer;">Holofeed</a>
        <button class="aurebesh-toggle-btn" id="aurebesh-toggle" onclick="toggleAurebesh()">AUREBESH</button>
        <button class="hc-toggle-btn" id="theme-btn" onclick="cycleTheme()">◈ BLUE HOLO</button>
      </div>
    </div>

    <!-- Heading -->
    <div class="page-header">
      <div class="page-title">PERSONS OF INTEREST</div>
      <div class="page-subtitle">CANTINA OBSCURA // PERSONNEL DIRECTORY</div>
    </div>

    <!-- Roster list populated and reordered by character-editor.html -->
    <div id="roster-list">
      <!-- ROSTER_ENTRIES_START -->
      <a class="roster-entry" href="mailindryss.html">

          <div class="roster-thumb-placeholder"><svg viewBox="0 0 100 100" fill="currentColor"><circle cx="50" cy="35" r="20"></circle><path d="M10 90 Q10 60 50 60 Q90 60 90 90 Z"></path></svg></div>

      <a class="roster-entry" href="ilonzurr.html">
        <div class="roster-thumb-wrap">
          <div class="roster-thumb-placeholder"><svg viewBox="0 0 100 100" fill="currentColor"><circle cx="50" cy="35" r="20"></circle><path d="M10 90 Q10 60 50 60 Q90 60 90 90 Z"></path></svg></div>
          <div class="roster-thumb-crt"></div>
        </div>
        <div class="roster-info">
          <div class="entry-name">I'lon Zurr</div>
          <div class="entry-occupation">Unknown</div>
        </div>

      </a>
      <a class="roster-entry" href="kayra-beshla.html">
        <div class="roster-thumb-wrap">
          <img class="roster-thumb" src="portraits/kayra-beshla.jpg" alt="Kayra Beshla" onerror="this.style.opacity='0'">

    </div>

    <!-- Footer -->
    <div class="footer-line">CANTINA OBSCURA // ENCRYPTED CHANNEL // AUTHORIZED EYES ONLY</div>

  </div><!-- /.datapad -->

  <script>
    // Clock
    (function() {
      function tick() {
        const n=new Date(),p=n=>String(n).padStart(2,'0');
        document.getElementById('hud-clock').textContent=p(n.getSeconds())+':'+p(n.getMinutes())+':'+p(n.getHours());
      }
      tick(); setInterval(tick,1000);
    })();

    // Aurebesh toggle
    function toggleAurebesh() {
      const body=document.body, btn=document.getElementById('aurebesh-toggle');
      body.classList.toggle('aurebesh-mode');
      btn.classList.toggle('active');
      btn.textContent = body.classList.contains('aurebesh-mode') ? 'BASIC' : 'AUREBESH';
    }

    // Theme cycler — matches holofeed-main themes
    const POI_THEMES = [
      { name:'Blue Holo',      bg:'#020610', bodyBg:'#010408', text:'#3a80cc', accent:'#4ab4ff', border:'#1c3060', dim:'#040916', panelBg:'rgba(6,12,28,0.92)',   hoverTint:'rgba(74,180,255,0.05)'  },
      { name:'Amber Burnout',  bg:'#090600', bodyBg:'#050400', text:'#b07020', accent:'#d48a0a', border:'#4a2e00', dim:'#0e0900', panelBg:'rgba(19,12,0,0.92)',   hoverTint:'rgba(212,138,10,0.06)'  },
      { name:'Red Alert',      bg:'#080204', bodyBg:'#040101', text:'#cc2828', accent:'#ff4444', border:'#4a1414', dim:'#0d0306', panelBg:'rgba(17,4,8,0.92)',    hoverTint:'rgba(255,68,68,0.05)'   },
      { name:'Void Purple',    bg:'#060408', bodyBg:'#030205', text:'#9055cc', accent:'#c084ff', border:'#341a54', dim:'#090610', panelBg:'rgba(13,8,22,0.92)',   hoverTint:'rgba(192,132,255,0.05)' },
      { name:'High Contrast',  bg:'#000000', bodyBg:'#000000', text:'#bbbbbb', accent:'#ffffff', border:'#5a5a5a', dim:'#0d0d0d', panelBg:'rgba(20,20,20,0.97)',  hoverTint:'rgba(255,255,255,0.06)' },
      { name:'Phosphor Green', bg:'#050804', bodyBg:'#020402', text:'#4a9e32', accent:'#4ecf36', border:'#2d4d20', dim:'#080d07', panelBg:'rgba(12,20,9,0.92)',   hoverTint:'rgba(78,207,54,0.05)'   }
    ];
    let poiThemeIdx = 0;

    function applyPoiTheme(i) {
      const t = POI_THEMES[i];
      const r = document.documentElement;
      r.style.setProperty('--bg',         t.bg);
      r.style.setProperty('--text',       t.text);
      r.style.setProperty('--accent',     t.accent);
      r.style.setProperty('--border',     t.border);
      r.style.setProperty('--dim',        t.dim);
      r.style.setProperty('--panel-bg',   t.panelBg);
      r.style.setProperty('--hover-tint', t.hoverTint);
      document.body.style.backgroundColor = t.bodyBg;
      // hi-contrast class no longer needed — theme handles it
      document.body.classList.remove('hi-contrast');
      document.getElementById('theme-btn').textContent = '◈ ' + t.name.toUpperCase();
      try { localStorage.setItem('cantina-poi-theme', i); } catch(_) {}
    }

    function cycleTheme() {
      poiThemeIdx = (poiThemeIdx + 1) % POI_THEMES.length;
      applyPoiTheme(poiThemeIdx);
    }

    // Restore saved theme on load
    (function() {
      try {
        const saved = localStorage.getItem('cantina-poi-theme');
        if (saved !== null) { poiThemeIdx = parseInt(saved) || 0; }
      } catch(_) {}
      applyPoiTheme(poiThemeIdx);
    })();
  </script>




</body></html>
