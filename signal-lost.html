<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Signal Lost — Cantina Obscura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0000;
      --text: #ff8888;
      --accent: #cc1111;
      --border: #6a0000;
      --dim: #1a0000;
      --danger: #ff4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Electrolize', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Full-screen scanlines */
    .page-scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px
      );
    }

    /* Rolling scan beam */
    .page-scan-roll {
      position: fixed; inset: 0; pointer-events: none; z-index: 11;
      background: linear-gradient(to bottom,
        transparent 0%, rgba(204,17,17,0.04) 50%, transparent 100%);
      background-size: 100% 300%;
      animation: scanroll 6s linear infinite;
    }
    @keyframes scanroll {
      0%   { background-position: 0 -100%; }
      100% { background-position: 0 300%; }
    }

    /* Watermark */
    .watermark {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }
    .watermark img {
      width: min(70vw, 70vh);
      height: auto;
      opacity: 0.06;
      filter: invert(1) sepia(1) saturate(5) hue-rotate(320deg);
    }

    /* Main content */
    .datapad {
      position: relative;
      z-index: 5;
      width: min(460px, calc(100vw - 2rem));
      border: 1px solid var(--border);
      background: var(--dim);
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 0 24px rgba(204,17,17,0.18), inset 0 0 12px rgba(0,0,0,0.5);
      animation: flicker 8s infinite;
    }
    @keyframes flicker {
      0%,100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.92; }
      94% { opacity: 1; }
      97% { opacity: 0.95; }
      98% { opacity: 1; }
    }

    .warning-icon {
      font-size: 3rem;
      color: var(--danger);
      text-shadow: 0 0 12px var(--danger);
      margin-bottom: 1rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; text-shadow: 0 0 12px var(--danger); }
      50%      { opacity: 0.6; text-shadow: 0 0 4px var(--danger); }
    }

    .signal-header {
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 0.25em;
      color: var(--danger);
      text-shadow: 0 0 8px var(--danger);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.2rem 0;
    }

    .signal-body {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      line-height: 1.8;
      color: var(--text);
      text-transform: uppercase;
    }

    .signal-sub {
      margin-top: 1.4rem;
      font-size: 0.75rem;
      color: var(--border);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .blink {
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    .return-link {
      margin-top: 1.4rem;
    }
    .return-link a {
      display: inline-block;
      padding: 0.45rem 1.2rem;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.7;
      transition: opacity 0.2s, border-color 0.2s, color 0.2s;
    }
    .return-link a:hover {
      opacity: 1;
      border-color: var(--danger);
      color: var(--danger);
    }

    .status-bar {
      margin-top: 1.6rem;
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 0.5rem 0.8rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--border);
      text-align: left;
      text-transform: uppercase;
    }
    .status-bar span { color: var(--danger); }
  </style>
</head>
<body>

  <div class="page-scanlines"></div>
  <div class="page-scan-roll"></div>

  <div class="watermark">
    <img id="wm-img" alt="">
  </div>

  <div class="datapad">
    <div class="warning-icon">⚠</div>
    <div class="signal-header">Signal Lost</div>
    <hr class="divider">
    <div class="signal-body">
      Connection to datapad terminated.<br>
      Physical access required to resume.
    </div>
    <div class="signal-sub">
      Rescan card to restore access<span class="blink">_</span>
    </div>
    <div class="status-bar">
      STATUS: <span>LINK SEVERED</span> &nbsp;|&nbsp; AUTH: <span>EXPIRED</span>
    </div>
    <div class="return-link">
      <a href="holonet/holofeed-main.html">◈ RETURN TO HOLONET FEED</a>
    </div>
  </div>
